<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1115" />
    <meta
      name="description"
      content="Metafeed (metafeed.it.com) — social feed: posts, reactions, comments, tags, search, and messages."
    />
    <meta property="og:site_name" content="Metafeed" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Metafeed" />
    <meta
      property="og:description"
      content="Metafeed (metafeed.it.com) — social feed: posts, reactions, comments, tags, search, and messages."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Metafeed</title>
    <script>
      (function () {
        var KEY = "metafeed-theme";
        var pref = "system";
        try {
          var s = localStorage.getItem(KEY);
          if (s === "light" || s === "dark" || s === "system") pref = s;
        } catch (e) {}
        var effective =
          pref === "system"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : pref;
        document.documentElement.setAttribute("data-theme", effective);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute("content", effective === "dark" ? "#0f1115" : "#f8f9fc");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
